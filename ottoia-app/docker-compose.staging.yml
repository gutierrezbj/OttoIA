# OttoIA - Docker Compose STAGING
# Mismos puertos que PROD (offset +130) — entornos aislados por servidor
# STAGING: 187.77.71.102 (Tailscale: 100.110.52.22)

services:
  ottoia-frontend:
    build:
      context: ..
      dockerfile: ottoia-app/frontend/Dockerfile
    container_name: ottoia-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3130:80"
    depends_on:
      - ottoia-api
    environment:
      - VITE_API_URL=/api
    networks:
      - ottoia-net

  ottoia-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ottoia-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4130:5000"
    depends_on:
      - ottoia-mongo
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://ottoia-mongo:27017/ottoia_staging
      - FRONTEND_URL=http://localhost:3130
      - NODE_ENV=staging
    networks:
      - ottoia-net

  ottoia-mongo:
    image: mongo:7
    container_name: ottoia-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:6130:27017"
    volumes:
      - ottoia-mongo-data:/data/db
    networks:
      - ottoia-net

  ottoia-redis:
    image: redis:7-alpine
    container_name: ottoia-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6131:6379"
    networks:
      - ottoia-net

volumes:
  ottoia-mongo-data:

networks:
  ottoia-net:
    driver: bridge
