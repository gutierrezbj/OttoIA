<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#1e293b"/>
  <text x="60" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">📚 OttoIA</text>
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Arquitectura Técnica v1.0</text>
  <text x="1050" y="50" font-family="Arial, sans-serif" font-size="14" fill="#64748b">2026</text>
  
  <!-- USUARIOS Section -->
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">USUARIOS</text>
  
  <!-- Niño -->
  <rect x="60" y="150" width="140" height="100" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="130" cy="185" r="20" fill="url(#blueGradient)"/>
  <text x="130" y="191" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">👦</text>
  <text x="130" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Niño</text>
  <text x="130" y="242" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">6-12 años</text>
  
  <!-- Padres -->
  <rect x="220" y="150" width="140" height="100" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="290" cy="185" r="20" fill="url(#greenGradient)"/>
  <text x="290" y="191" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">👨‍👩‍👧</text>
  <text x="290" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Padres</text>
  <text x="290" y="242" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Dashboard</text>
  
  <!-- Arrows from users to frontend -->
  <path d="M 130 250 L 130 290 L 350 290 L 350 320" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 290 250 L 290 290 L 350 290 L 350 320" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- FRONTEND Section -->
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">FRONTEND</text>
  
  <rect x="60" y="360" width="320" height="160" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="360" width="320" height="40" rx="16" fill="url(#blueGradient)"/>
  <rect x="60" y="385" width="320" height="15" fill="url(#blueGradient)"/>
  <text x="220" y="388" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Next.js + React</text>
  
  <!-- Frontend components -->
  <rect x="80" y="420" width="130" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="145" y="445" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">App Niño</text>
  
  <rect x="230" y="420" width="130" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="295" y="445" font-family="Arial, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Panel Padres</text>
  
  <rect x="80" y="470" width="280" height="35" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="220" y="493" font-family="Arial, sans-serif" font-size="11" fill="#854d0e" text-anchor="middle">Chat con Otto · Ejercicios · Reportes · Mapa Aventuras</text>
  
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Hosting: Vercel</text>
  
  <!-- Arrow Frontend to Backend -->
  <path d="M 380 440 L 450 440" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="395" y="430" font-family="Arial, sans-serif" font-size="10" fill="#64748b">REST API</text>
  
  <!-- BACKEND Section -->
  <text x="470" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">BACKEND</text>
  
  <rect x="470" y="360" width="320" height="200" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="470" y="360" width="320" height="40" rx="16" fill="url(#greenGradient)"/>
  <rect x="470" y="385" width="320" height="15" fill="url(#greenGradient)"/>
  <text x="630" y="388" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Node.js + Express</text>
  
  <!-- Backend modules -->
  <rect x="490" y="415" width="130" height="35" rx="6" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="555" y="437" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8" text-anchor="middle">🗣️ Tutor Service</text>
  
  <rect x="640" y="415" width="130" height="35" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="705" y="437" font-family="Arial, sans-serif" font-size="10" fill="#9a3412" text-anchor="middle">📊 Evaluador</text>
  
  <rect x="490" y="460" width="130" height="35" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="555" y="482" font-family="Arial, sans-serif" font-size="10" fill="#155e75" text-anchor="middle">🎯 Adaptación</text>
  
  <rect x="640" y="460" width="130" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="705" y="482" font-family="Arial, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">📝 Generador</text>
  
  <rect x="490" y="505" width="280" height="35" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="630" y="527" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">📈 Reportes Semanales · Progreso · Alertas</text>
  
  <text x="490" y="570" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Hosting: Railway / Render</text>
  
  <!-- Arrow Backend to Database -->
  <path d="M 630 560 L 630 610" stroke="#22c55e" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Arrow Backend to AI -->
  <path d="M 790 440 L 860 440" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  
  <!-- IA Section -->
  <text x="880" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">INTELIGENCIA ARTIFICIAL</text>
  
  <rect x="880" y="360" width="260" height="160" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="880" y="360" width="260" height="40" rx="16" fill="url(#purpleGradient)"/>
  <rect x="880" y="385" width="260" height="15" fill="url(#purpleGradient)"/>
  <text x="1010" y="388" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Claude API (Anthropic)</text>
  
  <rect x="900" y="415" width="220" height="90" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1010" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8" text-anchor="middle">🤖 Otto - Agente Tutor</text>
  <text x="1010" y="460" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">• Guía sin dar respuestas</text>
  <text x="1010" y="475" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">• Adapta tono por edad</text>
  <text x="1010" y="490" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">• Detecta frustración</text>
  
  <text x="900" y="530" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Modelo: claude-sonnet-4-20250514</text>
  
  <!-- DATABASE Section -->
  <text x="470" y="635" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">BASE DE DATOS</text>
  
  <rect x="470" y="655" width="320" height="140" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="470" y="655" width="320" height="40" rx="16" fill="url(#cyanGradient)"/>
  <rect x="470" y="680" width="320" height="15" fill="url(#cyanGradient)"/>
  <text x="630" y="683" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Supabase (PostgreSQL)</text>
  
  <!-- Database tables -->
  <rect x="490" y="710" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="532" y="730" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">👤 Usuarios</text>
  
  <rect x="585" y="710" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="627" y="730" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">👶 Niños</text>
  
  <rect x="680" y="710" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="722" y="730" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">📊 Progreso</text>
  
  <rect x="490" y="750" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="532" y="770" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">💬 Chat</text>
  
  <rect x="585" y="750" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="627" y="770" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">📝 Intentos</text>
  
  <rect x="680" y="750" width="85" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="722" y="770" font-family="Arial, sans-serif" font-size="9" fill="#155e75" text-anchor="middle">🎯 Skills</text>
  
  <!-- SKILLS DATA Section -->
  <text x="60" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">MATERIAS</text>
  
  <rect x="60" y="590" width="320" height="200" rx="16" fill="white" filter="url(#shadow)"/>
  
  <rect x="80" y="610" width="130" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="635" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">➕ Matemáticas</text>
  
  <rect x="230" y="610" width="130" height="40" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="295" y="635" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e" text-anchor="middle">📖 Lengua</text>
  
  <rect x="80" y="660" width="130" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="145" y="685" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">🔬 Ciencias</text>
  
  <rect x="230" y="660" width="130" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="295" y="685" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3" text-anchor="middle">🌍 Inglés</text>
  
  <text x="80" y="725" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Currículo LOMLOE España</text>
  <text x="80" y="740" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1º a 6º de Primaria (6-12 años)</text>
  <text x="80" y="755" font-family="Arial, sans-serif" font-size="10" fill="#64748b">~30 habilidades por materia</text>
  <text x="80" y="770" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Prerequisitos y dependencias</text>
  
  <!-- FLUJO Section -->
  <text x="880" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">FLUJO PRINCIPAL</text>
  
  <rect x="880" y="590" width="260" height="200" rx="16" fill="white" filter="url(#shadow)"/>
  
  <circle cx="910" cy="625" r="14" fill="url(#blueGradient)"/>
  <text x="910" y="630" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="935" y="630" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Check-in ánimo</text>
  
  <circle cx="910" cy="665" r="14" fill="url(#greenGradient)"/>
  <text x="910" y="670" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="935" y="670" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Mini-reto adaptado</text>
  
  <circle cx="910" cy="705" r="14" fill="url(#orangeGradient)"/>
  <text x="910" y="710" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="935" y="710" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Guía si se atasca</text>
  
  <circle cx="910" cy="745" r="14" fill="url(#purpleGradient)"/>
  <text x="910" y="750" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="935" y="750" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Evaluación invisible</text>
  
  <circle cx="910" cy="785" r="14" fill="url(#cyanGradient)"/>
  <text x="910" y="790" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <text x="935" y="790" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Reporte a padres</text>
  
  <!-- Footer -->
  <rect x="0" y="850" width="1200" height="50" fill="#1e293b"/>
  <text x="60" y="880" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Stack: Next.js + Node.js + Supabase + Claude API</text>
  <text x="500" y="880" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">|</text>
  <text x="530" y="880" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Hosting: Vercel + Railway</text>
  <text x="780" y="880" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">|</text>
  <text x="810" y="880" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Auth: Supabase Auth</text>
  <text x="1050" y="880" font-family="Arial, sans-serif" font-size="12" fill="#64748b">OttoIA © 2026</text>
</svg>
